stages:
  data_ingestion:
    cmd: python3 src/data/data_ingestion.py
    deps:
    - src/data/data_ingestion.py
    outs:
    - data/raw
  data_preprocessing:
    cmd: python3 src/data/data_preprocessing.py
    deps:
    - data/raw
    - src/data/data_preprocessing.py
    outs:
    - data/interim
  feature_engineering:
    cmd: python3 src/features/feature_engineering.py
    deps:
    - data/interim
    - src/features/feature_engineering.py
    outs:
    - data/processed
  model_building:
    cmd: python3 src/models/model_building.py
    deps:
    - data/processed/train_tfidf.csv
    - src/models/model_building.py
    outs:
    - models/model.pkl
  model_evaluation:
    cmd: python3 src/models/model_evaluation.py
    deps:
    - data/processed/test_tfidf.csv
    - models/model.pkl
    - src/models/model_evaluation.py
    outs:
    - reports/metrics.json
